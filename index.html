<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海龟汤·推理馆</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --text-muted: #666;
            --border: #2a2a4a;
            --input-bg: #222240;
            --category-default: #3a3a5c;
            --category-active: #533483;
            --gold: #ffd700;
            --green: #4caf84;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(233,68,96,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(83,52,131,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(15,52,96,0.15) 0%, transparent 70%);
        }

        /* ========== 两栏布局 ========== */
        .page-layout {
            display: flex; width: 100%; max-width: 1400px;
            height: 100vh; height: 100dvh; margin: 0 auto;
        }
        .left-col {
            width: 35%; min-width: 340px; max-width: 460px;
            height: 100vh; height: 100dvh; overflow-y: auto;
            padding: 20px 20px 16px;
            display: flex; flex-direction: column; gap: 8px;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        .left-col::-webkit-scrollbar { width: 3px; }
        .left-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .right-col {
            flex: 1; height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
            min-width: 0;
        }
        .right-col-inner {
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column;
            padding: 20px 24px 0;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .right-col-inner::-webkit-scrollbar { width: 4px; }
        .right-col-inner::-webkit-scrollbar-track { background: transparent; }
        .right-col-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ========== Header ========== */
        .header { width: 100%; padding: 0; text-align: center; }
        .title {
            font-size: 1.7rem; font-weight: 700; letter-spacing: 0.06em;
            background: linear-gradient(135deg, #e94560, #ff8c69, #ffd700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 2px;
        }
        .subtitle { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.2em; margin-bottom: 12px; }

        /* ========== 搜索框 ========== */
        .search-wrap {
            position: relative; display: inline-block; margin-bottom: 12px;
            width: 100%;
        }
        .search-input {
            width: 100%; padding: 8px 34px 8px 14px;
            font-size: 0.78rem; letter-spacing: 0.03em;
            color: var(--text-primary); background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 50px;
            outline: none; transition: border-color 0.25s ease;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(233,68,96,0.1); }
        .search-input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            font-size: 0.9rem; color: var(--text-muted); pointer-events: none;
        }
        .search-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0; right: 0;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 12px; max-height: 260px; overflow-y: auto;
            z-index: 100; display: none; box-shadow: 0 8px 28px rgba(0,0,0,0.4);
        }
        .search-dropdown.show { display: block; }
        .search-dropdown::-webkit-scrollbar { width: 4px; }
        .search-dropdown::-webkit-scrollbar-track { background: transparent; }
        .search-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .search-result-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; cursor: pointer; transition: background 0.15s ease;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            text-align: left;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: rgba(255,255,255,0.05); }
        .search-result-cat {
            font-size: 0.68rem; padding: 2px 8px; border-radius: 50px;
            flex-shrink: 0; letter-spacing: 0.04em;
        }
        .search-result-title { font-size: 0.82rem; color: #ddd; letter-spacing: 0.03em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .search-result-soup { font-size: 0.7rem; color: var(--text-muted); margin-left: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; flex-shrink: 1; }
        .search-empty { padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.8rem; }

        .random-btn-wrapper { margin-bottom: 12px; }
        .btn-random {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 24px; font-size: 0.9rem; font-weight: 600;
            letter-spacing: 0.04em; color: #fff;
            background: linear-gradient(135deg, var(--accent), #ff6b3d);
            border: none; border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(233,68,96,0.35);
        }
        .btn-random:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(233,68,96,0.5); }
        .btn-random:active { transform: translateY(0); }
        .btn-random .dice-icon { font-size: 1.2rem; }

        .categories { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .btn-category {
            padding: 5px 11px; font-size: 0.75rem; font-weight: 500;
            letter-spacing: 0.03em; color: var(--text-secondary);
            background: var(--category-default); border: 1px solid transparent;
            border-radius: 50px; cursor: pointer; transition: all 0.25s ease;
        }
        .btn-category:hover { color: #fff; background: #4a4a6e; border-color: #5a5a80; }
        .btn-category.active { color: #fff; background: var(--category-active); border-color: #7b5ea7; box-shadow: 0 2px 12px rgba(83,52,131,0.4); }

        /* ========== 难度筛选按钮 ========== */
        .difficulty-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 6px; }
        .btn-difficulty {
            padding: 4px 12px; font-size: 0.7rem; font-weight: 500;
            letter-spacing: 0.03em; border-radius: 50px; cursor: pointer;
            transition: all 0.25s ease; border: 1px solid var(--border);
            color: var(--text-secondary); background: rgba(255,255,255,0.03);
        }
        .btn-difficulty:hover { color: #fff; background: rgba(255,255,255,0.08); border-color: #5a5a80; }
        .btn-difficulty.all { border-color: rgba(255,255,255,0.15); }
        .btn-difficulty.all.active { color: #fff; background: var(--category-active); border-color: #7b5ea7; }
        .btn-difficulty.easy { border-color: rgba(76,175,132,0.3); color: #4caf84; }
        .btn-difficulty.easy:hover { background: rgba(76,175,132,0.1); border-color: rgba(76,175,132,0.5); }
        .btn-difficulty.easy.active { color: #fff; background: #2d6a4f; border-color: #4caf84; box-shadow: 0 2px 8px rgba(76,175,132,0.3); }
        .btn-difficulty.medium { border-color: rgba(255,215,0,0.3); color: #ffd700; }
        .btn-difficulty.medium:hover { background: rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.5); }
        .btn-difficulty.medium.active { color: #fff; background: #7a6b00; border-color: #ffd700; box-shadow: 0 2px 8px rgba(255,215,0,0.3); }
        .btn-difficulty.hard { border-color: rgba(233,68,96,0.3); color: #e94560; }
        .btn-difficulty.hard:hover { background: rgba(233,68,96,0.1); border-color: rgba(233,68,96,0.5); }
        .btn-difficulty.hard.active { color: #fff; background: #7a2030; border-color: #e94560; box-shadow: 0 2px 8px rgba(233,68,96,0.3); }

        /* ========== 信息条 + 进度条 ========== */
        .info-bar { width: 100%; padding: 0; margin-bottom: 3px; }
        .info-bar-inner {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 10px 18px;
        }
        .info-puzzle-name {
            font-size: 0.85rem; font-weight: 600; color: var(--gold);
            letter-spacing: 0.04em; min-width: 0; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .info-puzzle-name .label { color: var(--text-muted); font-weight: 400; margin-right: 4px; }
        .info-category-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; font-size: 0.72rem; font-weight: 500;
            color: #e94560; background: rgba(233,68,96,0.1);
            border: 1px solid rgba(233,68,96,0.25);
            border-radius: 50px; white-space: nowrap; flex-shrink: 0;
        }

        .progress-wrap { width: 100%; padding: 0; margin-bottom: 2px; }
        .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .progress-label { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.05em; }
        .progress-percent { font-size: 0.82rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; }
        .progress-bar-outer { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
        .progress-bar-inner {
            height: 100%; width: 0%; border-radius: 3px;
            background: linear-gradient(90deg, #533483, #e94560, #ffd700);
            transition: width 0.5s ease;
        }

        /* ========== 汤面卡片 ========== */
        .main-content { width: 100%; padding: 0; }
        .card {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px 20px;
            position: relative; overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
            transition: opacity 0.2s ease;
        }
        .card.switching { opacity: 0.4; }
        .card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, #e94560, #533483, #e94560); opacity: 0.7;
        }
        .card-tag {
            display: inline-block; padding: 2px 10px; font-size: 0.7rem;
            font-weight: 500; letter-spacing: 0.05em; color: #e94560;
            background: rgba(233,68,96,0.1); border: 1px solid rgba(233,68,96,0.25);
            border-radius: 50px; margin-bottom: 10px;
        }
        .card-title { font-size: 0.92rem; font-weight: 600; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.03em; }
        .card-question { font-size: 0.95rem; line-height: 1.8; color: #ddd; letter-spacing: 0.03em; }
        .card-index { margin-top: 12px; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.05em; }

        /* ========== 操作按钮行 ========== */
        .action-bar { width: 100%; padding: 0; margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-action {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 7px 16px; font-size: 0.78rem; font-weight: 500;
            letter-spacing: 0.04em; border-radius: 50px; cursor: pointer;
            transition: all 0.25s ease; border: 1px solid var(--border);
            color: var(--text-secondary); background: rgba(255,255,255,0.04);
        }
        .btn-action:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: #5a5a80; }
        .btn-action:active { transform: scale(0.96); }
        .btn-action.hint { border-color: rgba(255,215,0,0.3); color: var(--gold); }
        .btn-action.hint:hover { background: rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.5); }
        .btn-action.hint:disabled {
            opacity: 0.35; cursor: not-allowed; pointer-events: none;
        }
        .btn-action.reveal { border-color: rgba(255,140,60,0.3); color: #ff8c3d; }
        .btn-action.reveal:hover { background: rgba(255,140,60,0.1); border-color: rgba(255,140,60,0.5); }
        .btn-action .badge {
            display: inline-block; min-width: 18px; text-align: center;
            font-size: 0.68rem; padding: 1px 5px; border-radius: 8px;
            background: rgba(255,255,255,0.08);
        }
        .btn-action.stuck { border-color: rgba(120,180,255,0.3); color: #78b4ff; }
        .btn-action.stuck:hover { background: rgba(120,180,255,0.1); border-color: rgba(120,180,255,0.5); }

        /* ========== 温和模式开关 ========== */
        .gentle-toggle {
            display: inline-flex; align-items: center; gap: 8px;
            cursor: pointer; user-select: none; margin-bottom: 10px;
        }
        .gentle-toggle .track {
            width: 40px; height: 22px; border-radius: 11px;
            background: var(--category-default); border: 1px solid var(--border);
            position: relative; transition: background 0.3s ease;
        }
        .gentle-toggle .thumb {
            position: absolute; top: 2px; left: 2px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #aaa; transition: all 0.3s ease;
        }
        .gentle-toggle.on .track { background: #533483; border-color: #7b5ea7; }
        .gentle-toggle.on .thumb { left: 20px; background: #c0a0ff; }
        .gentle-toggle .label-text {
            font-size: 0.75rem; color: var(--text-secondary); letter-spacing: 0.04em;
        }
        .gentle-toggle.on .label-text { color: #c0a0ff; }

        /* ========== 对话记录区 ========== */
        .conversation-wrap { width: 100%; padding: 0; margin-top: 0; flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .conversation-header {
            font-size: 0.73rem; color: var(--text-muted); letter-spacing: 0.06em;
            margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
        }
        .conversation-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .conversation-list {
            display: flex; flex-direction: column; gap: 8px;
            flex: 1; overflow-y: auto; padding-right: 6px;
            scroll-behavior: smooth; min-height: 0;
        }
        .conversation-list::-webkit-scrollbar { width: 4px; }
        .conversation-list::-webkit-scrollbar-track { background: transparent; }
        .conversation-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .conv-entry { display: flex; flex-direction: column; gap: 4px; animation: fadeInUp 0.25s ease both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .conv-question {
            align-self: flex-end; max-width: 82%;
            background: rgba(233,68,96,0.12); border: 1px solid rgba(233,68,96,0.2);
            border-radius: 14px 14px 4px 14px; padding: 8px 14px;
            font-size: 0.85rem; color: #f0c0c0; letter-spacing: 0.03em; word-break: break-word;
        }
        .conv-answer {
            align-self: flex-start; max-width: 88%;
            border-radius: 14px 14px 14px 4px; padding: 8px 14px;
            font-size: 0.82rem; letter-spacing: 0.03em; word-break: break-word;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .conv-answer.yes  { background: rgba(76,175,132,0.1); border: 1px solid rgba(76,175,132,0.25); color: #a0e0c0; }
        .conv-answer.no   { background: rgba(233,68,96,0.1);  border: 1px solid rgba(233,68,96,0.2);  color: #f0a0a0; }
        .conv-answer.irrelevant { background: rgba(122,122,154,0.08); border: 1px solid rgba(122,122,154,0.15); color: #aaa; }
        .conv-answer.hint-system { background: rgba(255,215,0,0.06); border: 1px solid rgba(255,215,0,0.2); color: #e0d090; }
        .conv-verdict {
            font-weight: 700; font-size: 0.78rem; flex-shrink: 0;
            min-width: 54px; text-align: center; padding: 2px 6px;
            border-radius: 4px; letter-spacing: 0.05em;
        }
        .conv-answer.yes .conv-verdict { color: var(--green); background: rgba(76,175,132,0.15); }
        .conv-answer.no  .conv-verdict { color: #e94560; background: rgba(233,68,96,0.15); }
        .conv-answer.irrelevant .conv-verdict { color: #999; background: rgba(255,255,255,0.05); }
        .conv-answer.hint-system .conv-verdict { color: var(--gold); background: rgba(255,215,0,0.12); }

        .conv-empty { text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 28px 0; letter-spacing: 0.05em; }

        /* ========== 底部输入区 ========== */
        .footer-area {
            width: 100%; padding: 16px 24px 20px;
            background: var(--bg-primary);
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .input-group {
            display: flex; gap: 8px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 50px;
            padding: 5px 5px 5px 18px; transition: border-color 0.3s ease;
        }
        .input-group:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(233,68,96,0.1); }
        .input-group input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text-primary); font-size: 0.9rem; letter-spacing: 0.03em; min-width: 0;
        }
        .input-group input::placeholder { color: var(--text-muted); }
        .btn-send {
            padding: 9px 20px; font-size: 0.9rem; font-weight: 600;
            letter-spacing: 0.04em; color: #fff; background: var(--accent);
            border: none; border-radius: 50px; cursor: pointer;
            transition: all 0.25s ease; white-space: nowrap; flex-shrink: 0;
        }
        .btn-send:hover { background: var(--accent-hover); }
        .btn-send:active { transform: scale(0.96); }
        .input-hint { text-align: center; margin-top: 8px; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.04em; }

        /* ========== 胜利弹窗 ========== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 20px; padding: 36px 32px 28px; max-width: 520px; width: 90%;
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: scaleIn 0.35s ease;
        }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        .modal-emoji { font-size: 4rem; margin-bottom: 12px; }
        .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--gold); letter-spacing: 0.06em; margin-bottom: 8px; }
        .modal-subtitle { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 20px; }
        .modal-answer-box {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px 20px; text-align: left;
            font-size: 0.9rem; line-height: 1.8; color: #ccc;
            letter-spacing: 0.03em; margin-bottom: 22px;
        }
        .modal-answer-box .label {
            display: block; font-size: 0.7rem; color: var(--accent);
            letter-spacing: 0.08em; margin-bottom: 8px; font-weight: 600;
        }
        .btn-new-game {
            padding: 10px 30px; font-size: 0.95rem; font-weight: 600;
            letter-spacing: 0.05em; color: #fff;
            background: linear-gradient(135deg, var(--accent), #ff6b3d);
            border: none; border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 16px rgba(233,68,96,0.35);
        }
        .btn-new-game:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(233,68,96,0.5); }

        .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-close-modal {
            padding: 10px 30px; font-size: 0.95rem; font-weight: 600;
            letter-spacing: 0.05em; color: var(--text-secondary);
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 50px; cursor: pointer; transition: all 0.25s ease;
        }
        .btn-close-modal:hover { color: #fff; background: rgba(255,255,255,0.12); border-color: #5a5a80; }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            html, body { overflow: hidden; height: 100dvh; }
            .page-layout {
                flex-direction: column; height: 100dvh;
            }
            .left-col {
                width: 100%; max-width: 100%; min-width: 0;
                height: auto; max-height: 40dvh; overflow-y: auto;
                border-right: none; flex-shrink: 0;
                border-bottom: 1px solid var(--border);
                padding: 12px 12px 10px; gap: 4px;
            }
            .right-col {
                flex: 1; min-height: 0;
                height: auto;
            }
            .right-col-inner {
                flex: 1; overflow-y: auto;
                padding: 10px 12px 0;
                -webkit-overflow-scrolling: touch;
            }
            .conversation-list { max-height: none; flex: 1; }
            .footer-area { padding: 10px 12px 14px; }
            .title { font-size: 1.4rem; }
            .card { padding: 14px 14px; }
            .card-question { font-size: 0.9rem; line-height: 1.6; }
            .categories { gap: 4px; }
            .btn-category { padding: 4px 9px; font-size: 0.72rem; }
            .btn-random { padding: 7px 18px; font-size: 0.82rem; }
            .input-group { padding: 4px 4px 4px 12px; }
            .btn-send { padding: 7px 14px; font-size: 0.82rem; }
            .conv-question { max-width: 90%; font-size: 0.8rem; }
            .conv-answer { max-width: 94%; font-size: 0.78rem; }
            .modal { padding: 26px 18px 20px; }

];
        // ======================== DOM 引用 ========================
        const categoryButtons  = document.querySelectorAll('.btn-category');

        const conversationList = document.getElementById('conversationList');
        const convEmpty        = document.getElementById('convEmpty');

        const modalAnswer      = document.getElementById('modalAnswer');
        const searchInput      = document.getElementById('searchInput');
        const searchDropdown   = document.getElementById('searchDropdown');
        const searchWrap       = document.getElementById('searchWrap');

        // ======================== 状态 ========================
        let currentPuzzle     = null;
        let discoveredKeys    = new Set();
        let hintRemaining     = 3;
        let currentCategory   = '综合';
        let gentleMode        = false;
        let autoHintUsed      = false;  // 温和模式50%自动提示是否已触发
        let currentDifficulty = 'all';  // 难度筛选

        // ======================== 辅助函数 ========================
        function getCategoryEmoji(cat) {
            const map = { '综合':'📚','悬疑':'🔍','搞笑':'😂','烧脑':'🧠','犯罪':'🕵️','恐怖':'👻','温情':'💛','科幻':'🚀' };
            return map[cat] || '🍲';
        }
        function getPuzzlesByCategory(cat) { return puzzles.filter(p => p.category === cat); }
        function getFilteredPuzzles(cat) {
            return puzzles.filter(p =>
                p.category === cat &&
                (currentDifficulty === 'all' || p.difficulty === currentDifficulty)
            );
        }
        function pickRandom(arr)           { return arr[Math.floor(Math.random() * arr.length)]; }

        // ======================== 中文分词 ========================
        const STOP_WORDS = new Set([
            '是','的','了','吗','呢','吧','啊','哦','嗯','么','嘛','呀','这','那',
            '什么','怎么','为什么','哪里','哪个','谁','哪','一个','一下','一点','一些',
            '这个','那个','不','没','有','在','和','与','或','而','但','因为','所以',
            '如果','虽然','然后','我','你','他','她','它','我们','你们','他们','她们',
            '请问','想知道','是不是','有没有','会不会','能不能','请问一下','想问一下',
            '我想问','可不可以','是否','可否','到','就','都','也','还','又','再','才',
            '刚','已经','人','把','被','让','给','从','对','向','朝','用','以','很',
            '非常','比较','太','真','好','大','小','多','少','发生','事情','回事',
            '情况','原因','理由','问题','能','会','可以','可能','应该','需要','觉得',
            '认为','说','做','来','去','上','下','里','外','中','前','后','现在',
            '当时','之后','之前','以后','的时候','是这样吗','对不对','对吧','是这样',
            '这么说','他是不是','她是不是','意思是','就是说','是因为','所以呢',
            '然后呢','到底','究竟','为什么','干嘛','怎么回','怎么样','请','一下','这个'
        ]);

        function extractKeywords(text) {
            const cleaned = text.replace(/[，。！？、；：""''《》（）…—\s\?\!,\.;:'"()\[\]{}]+/g, ' ').trim();
            if (!cleaned) return [];
            const words = new Set();
            for (let len = 4; len >= 2; len--) {
                for (let i = 0; i <= cleaned.length - len; i++) {
                    const gram = cleaned.substring(i, i + len);
                    if (!STOP_WORDS.has(gram) && gram.trim().length >= 2) words.add(gram);
                }
            }
            for (const ch of cleaned) { if (!STOP_WORDS.has(ch) && ch.trim()) words.add(ch); }
            return [...words];
        }

        function overlapScore(qKeywords, targetText) {
            if (!targetText || qKeywords.length === 0) return 0;
            const lower = targetText.toLowerCase();
            let hits = 0;
            for (const kw of qKeywords) {
                if (kw.length >= 2 && lower.includes(kw)) hits += kw.length;
            }
            return hits;
        }

        // ======================== 判断逻辑 ========================
        function judgeQuestion(question, puzzle) {
            const qKeywords = extractKeywords(question);
            const qLower    = question.toLowerCase().replace(/\s/g, '');
            const posScore  = overlapScore(qKeywords, puzzle.positives.join(' '));
            const negScore  = overlapScore(qKeywords, puzzle.negatives.join(' '));
            const ansScore  = overlapScore(qKeywords, puzzle.answer);

            // ---- 严格的关键点发现（仅当提问明确涉及关键点核心内容时） ----
            const newKeys = [];

            for (const key of puzzle.keys) {
                if (discoveredKeys.has(key)) continue;

                const keyLower = key.toLowerCase();
                const keyChars = key.replace(/\s/g, '');

                // 条件1：提问原文直接包含完整关键点 → 立即发现
                if (qLower.includes(keyLower)) {
                    newKeys.push(key);
                    continue;
                }

                // 条件2：计算关键点字符在提问中的命中率（核心逻辑）
                let charHits = 0;
                for (const ch of keyChars) {
                    if (qLower.includes(ch)) charHits++;
                }
                const charMatchRatio = charHits / Math.max(1, keyChars.length);

                // 条件3：用户关键词中是否有与关键点高度重合的（子串包含）
                let hasKeywordMatch = false;
                for (const kw of qKeywords) {
                    if (kw.length < 2) continue;
                    // 关键点包含该关键词（如关键点="冰刀"，关键词="冰刀"或"冰"）
                    if (keyLower.includes(kw) && kw.length >= Math.ceil(keyLower.length * 0.6)) {
                        hasKeywordMatch = true;
                        break;
                    }
                    // 该关键词包含关键点（如关键词="冰刀融化"，关键点="冰刀"）
                    if (kw.includes(keyLower)) {
                        hasKeywordMatch = true;
                        break;
                    }
                }

                // 只有字符命中率 ≥ 70% 且有关键词匹配，或命中率 ≥ 85%，才标记为已发现
                if ((charMatchRatio >= 0.7 && hasKeywordMatch) || charMatchRatio >= 0.85) {
                    newKeys.push(key);
                }
            }

            // 裁决（是/否/无关 —— 与关键点发现完全独立）
            let verdict;
            if (posScore > negScore && posScore >= 4) {
                verdict = '是';
            } else if (negScore > posScore && negScore >= 4) {
                verdict = '否';
            } else if (ansScore >= 3) {
                verdict = '是';
            } else if (posScore >= 2) {
                verdict = '是';
            } else if (negScore >= 2) {
                verdict = '否';
            } else {
                verdict = '与此无关';
            }

            // 温和模式：生成简短引导解释
            let gentleHint = '';
            if (gentleMode) {
                if (verdict === '是' && newKeys.length > 0) {
                    gentleHint = '，关键线索：' + newKeys[0];
                } else if (verdict === '是') {
                    // 从positives中找到与提问最匹配的词作为提示
                    const qLower = question.toLowerCase();
                    const hit = puzzle.positives.find(p => p.length >= 2 && qLower.includes(p.toLowerCase()));
                    gentleHint = hit ? '，方向正确，继续深入' : '，思路对了';
                } else if (verdict === '否') {
                    // 给出一个未发现的关键点方向
                    const remaining = puzzle.keys.filter(k => !discoveredKeys.has(k));
                    if (remaining.length > 0) {
                        gentleHint = '，试试思考：' + remaining[Math.floor(Math.random() * remaining.length)];
                    } else {
                        gentleHint = '，换个角度想想';
                    }
                } else {
                    // 无关 — 引导关注核心
                    const remaining = puzzle.keys.filter(k => !discoveredKeys.has(k));
                    if (remaining.length > 0) {
                        gentleHint = '，建议关注：' + remaining[Math.floor(Math.random() * remaining.length)];
                    }
                }
            }

            return { verdict, response: verdict + gentleHint, newKeys };
        }

        // ======================== 进度 & 胜利 ========================
        function updateProgress() {
            if (!currentPuzzle) return;
            const total = currentPuzzle.keys.length;
            if (total === 0) { progressPercent.textContent = '0%'; progressBar.style.width = '0%'; return; }
            const discovered = discoveredKeys.size;
            const pct = Math.round((discovered / total) * 100);
            progressPercent.textContent = pct + '%';
            progressBar.style.width = pct + '%';
            progressPercent.style.color = pct >= 80 ? '#4caf84' : '#ffd700';

            // 温和模式：匹配度刚到50%时自动提示一次
            if (gentleMode && !autoHintUsed && pct >= 50 && currentPuzzle) {
                autoHintUsed = true;
                const undiscovered = currentPuzzle.keys.filter(k => !discoveredKeys.has(k));
                if (undiscovered.length > 0) {
                    const revealed = undiscovered[Math.floor(Math.random() * undiscovered.length)];
                    addConversationEntry(null, '温和提示', '🌟 你已经推进到 ' + pct + '%！关键线索：**' + revealed + '**');
                }
            }
        }

        function checkWinCondition() {
            if (!currentPuzzle) return;
            const total = currentPuzzle.keys.length;
            if (total === 0) return;
            const pct = Math.round((discoveredKeys.size / total) * 100);
            if (pct >= 80) showWinModal();
        }

        // ======================== 对话记录 ========================
        function addConversationEntry(question, verdict, response) {
            const el = convEmpty; if (el) el.style.display = 'none';
            const entry = document.createElement('div'); entry.className = 'conv-entry';

            if (question) {

            aBubble.className = 'conv-answer ' + (vMap[verdict] || 'irrelevant');

            const vSpan = document.createElement('span');
            vSpan.className = 'conv-verdict';
            vSpan.textContent = '▎' + verdict;

        /** 滚动聊天记录到底部（兼容移动端 .right-col-inner 滚动容器） */
        function scrollChatToBottom() {

        // ======================== 弹窗 ========================
        function showWinModal() {
            if (!currentPuzzle) return;
            const total = currentPuzzle.keys.length;

            const pct = Math.round((discoveredKeys.size / total) * 100);
            modalEmoji.textContent = '🎉';

        function showAnswerModal() {
            if (!currentPuzzle) return;

            currentPuzzle.keys.forEach(k => discoveredKeys.add(k));

        // ======================== 提示功能 ========================
        function useHint() {
            if (!currentPuzzle) return;
            if (hintRemaining <= 0) return;

            // 找出尚未发现的关键点
            const undiscovered = currentPuzzle.keys.filter(k => !discoveredKeys.has(k));
            if (undiscovered.length === 0) return;

            // 随机揭示一个（仅展示线索，不计入匹配度）
            const revealed = pickRandom(undiscovered);

            hintRemaining--;

            if (hintRemaining <= 0) {

            updateProgress();
            checkWinCondition();
        }

        // ======================== 加载题目 ========================
        function loadPuzzle(puzzle, animate = true) {
            if (!puzzle) return;
            const emoji = getCategoryEmoji(puzzle.category);

            if (animate && currentPuzzle) {
                card.classList.add('switching');
                setTimeout(() => { renderPuzzleContent(puzzle, emoji); card.classList.remove('switching'); }, 150);
            } else {
                renderPuzzleContent(puzzle, emoji);

            currentPuzzle = puzzle;
            currentCategory = puzzle.category;
            highlightCategory(puzzle.category);
            updateInfoBar(puzzle);
            resetGameState();
            input.focus();
        }

        function renderPuzzleContent(puzzle, emoji) {
            const diffEmoji = { '简单':'🟢','中等':'🟡','困难':'🔴' };
            cardTag.textContent      = emoji + ' ' + puzzle.category;
            cardTitle.textContent    = puzzle.title;
            cardQuestion.textContent = puzzle.soup;
            cardIndex.textContent    = '#' + puzzle.id + '  ·  ' + puzzle.category + '  ·  ' + (diffEmoji[puzzle.difficulty]||'') + ' ' + (puzzle.difficulty||'');
        }

        function highlightCategory(cat) {
            categoryButtons.forEach(b => b.classList.remove('active'));
            const tgt = document.querySelector(`.btn-category[data-category="${cat}"]`);
            if (tgt) tgt.classList.add('active');

        function updateInfoBar(puzzle) {
            const emoji = getCategoryEmoji(puzzle.category);

        /** 重置游戏状态（保留当前题目） */
        function resetGameState() {
            discoveredKeys.clear();
            hintRemaining = 3;
            autoHintUsed = false;
            hintBadge.textContent = '3';
            btnHint.disabled = false;
            conversationList.innerHTML = '';

            conversationList.appendChild(emptyDiv);

        // ======================== 选题 ========================
        function randomPuzzleFromAll() {
            const pool = currentDifficulty === 'all'
                ? puzzles
                : puzzles.filter(p => p.difficulty === currentDifficulty);
            if (pool.length === 0) return;
            loadPuzzle(pickRandom(pool), true);
        }
        function randomPuzzleByCategory(cat) {
            let list = getFilteredPuzzles(cat);

            // 回退1：当前分类 + 全部难度
            if (list.length === 0 && currentDifficulty !== 'all') {
                list = puzzles.filter(p => p.category === cat);
                if (list.length > 0) {
                    addConversationEntry(null, '提示', '「' + cat + '」分类下没有「' + currentDifficulty + '」难度的题目，已自动显示全部难度。');
                }
            }
            // 回退2：综合分类 + 全部难度
            if (list.length === 0 && cat !== '综合') {
                list = puzzles.filter(p => p.category === '综合');
                if (list.length > 0) {
                    addConversationEntry(null, '提示', '「' + cat + '」分类下暂无题目，已自动切换到综合分类。');
                    // 同步更新分类按钮高亮
                    highlightCategory('综合');
                }
            }
            // 回退3：任意题目
            if (list.length === 0) {
                list = puzzles;
            }
            if (list.length === 0) return;

            if (currentPuzzle && currentPuzzle.category === cat && list.length > 1) {
                const others = list.filter(p => p.id !== currentPuzzle.id);
                loadPuzzle(pickRandom(others.length > 0 ? others : list), true);
            } else {
                loadPuzzle(pickRandom(list), true);
            }
        }

        // ======================== 提问处理 ========================
        function handleAsk() {
            const question = input.value.trim();
            if (!question) return;
            if (!currentPuzzle) { randomPuzzleFromAll(); input.value = ''; return; }

            const result = judgeQuestion(question, currentPuzzle);
            for (const key of result.newKeys) discoveredKeys.add(key);
            addConversationEntry(question, result.verdict, result.response);
            updateProgress();
            checkWinCondition();
            input.value = '';
            input.focus();
        }

        // ======================== 事件绑定 ========================
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => randomPuzzleByCategory(btn.dataset.category));
        });
        difficultyBtns.forEach(btn => {

                const activeCat = document.querySelector('.btn-category.active');
                if (activeCat) {
                    randomPuzzleByCategory(activeCat.dataset.category);
                } else {
                    randomPuzzleFromAll();
                }
            });
        });
        btnRandom.addEventListener('click', randomPuzzleFromAll);
        btnSend.addEventListener('click', handleAsk);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); handleAsk(); }
        });

        // 移动端：输入框聚焦时自动滚动到可见区域
        input.addEventListener('focus', () => {
            setTimeout(() => {
                input.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                // 确保聊天记录也滚到底部
                scrollChatToBottom();
            }, 350);
        });

        // 提示
        btnHint.addEventListener('click', useHint);

        // 换一题（同分类随机）
        btnChangePuzzle.addEventListener('click', () => {
            if (!currentPuzzle) { randomPuzzleFromAll(); return; }
            randomPuzzleByCategory(currentPuzzle.category);
        });

        // 重新开始（重置当前题目）
        btnReset.addEventListener('click', () => {
            if (!currentPuzzle) return;
            resetGameState();
            addConversationEntry(null, '提示', '🔁 已重置当前题目，所有线索和对话已清空。加油！');
            updateProgress();
            input.focus();
        });

        // 弹窗
        btnNewGame.addEventListener('click', () => { hideWinModal(); randomPuzzleFromAll(); });
        btnCloseModal.addEventListener('click', () => { hideWinModal(); });
        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) hideWinModal(); });

        // 显示答案
        btnShowAnswer.addEventListener('click', () => {
            if (!currentPuzzle) return;
            showAnswerModal();
        });

        // 温和模式开关
        gentleToggle.addEventListener('click', () => {
            gentleMode = !gentleMode;
            if (gentleMode) {
                gentleToggle.classList.add('on');
            } else {
                gentleToggle.classList.remove('on');
            }
        });

        // 我卡住了：按顺序揭示下一个未发现关键点
        btnStuck.addEventListener('click', () => {
            if (!currentPuzzle) return;
            const undiscovered = currentPuzzle.keys.filter(k => !discoveredKeys.has(k));
            if (undiscovered.length === 0) {
                addConversationEntry(null, '提示', '✅ 所有关键线索都已揭示！');
                return;
            }
            // 按keys原始顺序取第一个未发现的
            const nextKey = currentPuzzle.keys.find(k => !discoveredKeys.has(k));
            addConversationEntry(null, '温和提示', '🆘 下一步关键线索：**' + nextKey + '**');
        });

        // ======================== 搜索功能 ========================
        const CAT_COLORS = {
            '综合':'#5badd4','悬疑':'#e94560','搞笑':'#ffd700','烧脑':'#7b5ea7','犯罪':'#ff6b3d',
            '恐怖':'#888','温情':'#ff8c69','科幻':'#4caf84'
        };

        function performSearch(query) {
            const q = query.trim().toLowerCase();
            if (!q) { searchDropdown.classList.remove('show'); searchDropdown.innerHTML = ''; return; }

            // 在标题/汤面/汤底/关键点中搜索
            const results = puzzles.filter(p =>
                p.title.toLowerCase().includes(q) ||
                p.soup.toLowerCase().includes(q) ||
                p.answer.toLowerCase().includes(q) ||
                p.keys.some(k => k.toLowerCase().includes(q)) ||
                p.category.toLowerCase().includes(q)
            );

            if (results.length === 0) {
                searchDropdown.innerHTML = '<div class="search-empty">未找到匹配的题目</div>';
            } else {
                searchDropdown.innerHTML = results.map(p => {
                    const color = CAT_COLORS[p.category] || '#aaa';
                    const soupPreview = p.soup.length > 18 ? p.soup.slice(0, 18) + '…' : p.soup;
                    return `
                        <div class="search-result-item" data-id="${p.id}">
                            <span class="search-result-cat" style="color:${color};background:${color}18;border:1px solid ${color}33;">${getCategoryEmoji(p.category)} ${p.category}</span>
                            <span class="search-result-title">${p.title}</span>
                            <span class="search-result-soup">${soupPreview}</span>
                        </div>`;
                }).join('');
            }
            searchDropdown.classList.add('show');
        }

        let searchDebounce;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => performSearch(searchInput.value), 200);
        });

        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim()) performSearch(searchInput.value);
        });

        // 点击结果项 → 加载题目
        searchDropdown.addEventListener('click', (e) => {
            const item = e.target.closest('.search-result-item');
            if (!item) return;
            const id = parseInt(item.dataset.id);
            const puzzle = puzzles.find(p => p.id === id);
            if (puzzle) {
                loadPuzzle(puzzle, true);
                searchInput.value = '';
                searchDropdown.classList.remove('show');
                searchDropdown.innerHTML = '';
            }
        });

        // 点击外部关闭下拉
        document.addEventListener('click', (e) => {
            if (!searchWrap.contains(e.target)) {
                searchDropdown.classList.remove('show');
            }
        });

        // ESC 关闭
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchDropdown.classList.remove('show');
                searchInput.blur();
            }
        });

        // ======================== 初始加载 ========================
        randomPuzzleByCategory('综合');
    </script>
</body>
</html>
